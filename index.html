<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>من أعماق قلب محمد للينا ❤️</title>

<style>
body{
  margin:0;
  padding:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ff758c,#ff7eb3);
  color:white;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  height:100vh;
}

h1{
  font-size:60px;
  margin-top:20px;
  text-shadow: 0 0 20px #fff;
}

button{
  margin-top:30px;
  padding:15px 40px;
  font-size:22px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff4b7d;
  cursor:pointer;
}

#loveMessage{
  max-width:700px;
  margin-top:30px;
  font-size:24px;
  line-height:1.8;
  display:none;
  background:rgba(255,255,255,0.15);
  padding:25px;
  border-radius:20px;
  text-align:left;
}

.heart-fly{
  position:absolute;
  font-size:25px;
  animation:fly 6s linear infinite;
}

@keyframes fly{
  from{transform:translateY(100vh);opacity:1;}
  to{transform:translateY(-10vh);opacity:0;}
}
</style>
</head>

<body>

<h1>من أعماق قلب محمد للينا ❤️</h1>

<button onclick="showMessage()">Open Message 💌</button>

<div id="loveMessage"></div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" autoplay loop></audio>

<script>
// الرسالة الطويلة
const text = `ليـنا الغالية،
في هذا اليوم المميز… يوم ميلادك،
أريد أن أخبرك بشيء من أعماق قلبي.

أنت لست مجرد فتاة عادية…
أنت قمر يضيء السماء عندما يختفي الضوء،
ونجمة تلمع في أكثر الليالي ظلامًا.

أنت لست مجرد فتاة…
أنت وردة نادرة تجعل العالم أجمل فقط بوجودها.

ابتسامتك قادرة على تغيير يوم كامل،
وكلماتك البسيطة يمكن أن تصنع سعادة لا توصف.

أحيانًا أتساءل كيف يمكن لشخص واحد
أن يحمل كل هذا الجمال واللطف في قلبه.

في يوم ميلادك،
أتمنى لك سعادة لا تنتهي،
وأحلامًا تتحقق واحدة تلو الأخرى،
وأيامًا مليئة بالضحك والطمأنينة.

وأريدك أن تعرفي شيئًا واحدًا فقط…
أن وجودك في هذا العالم ليس عاديًا أبدًا،
بل هو شيء مميز يجعل الحياة أجمل بكثير.

كل عام وأنتِ القمر الذي يضيء أيامي،
وكل عام وأنتِ أجمل صدفة حدثت في حياتي.

عيد ميلاد سعيد ❤️`;

let i=0;
function showMessage(){
  document.getElementById("loveMessage").style.display="block";
  function typing(){
    if(i<text.length){
      document.getElementById("loveMessage").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing,35);
    }
  }
  typing();
}

// قلوب صغيرة تطير
function createHeart(){
  const heart=document.createElement("div");
  heart.className="heart-fly";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(Math.random()*25+10)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,300);
</script>

</body>
</html>
